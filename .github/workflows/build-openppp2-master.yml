# Description: Build openppp2 master branch (modified fork) - All variants.
#              Builds 8 amd64 variants + 4 aarch64 variants using prebuilt 3rd-party libs.
# Author     : picetor
# Date-Time  : 2026/06/24

name: Build openppp2 (Master Branch)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:      # 手动触发
    inputs:
      build_amd64:
        description: 'Build amd64 variants'
        type: boolean
        default: true
      build_aarch64:
        description: 'Build aarch64 variants'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS (arm64 + amd64)'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows (x64)'
        type: boolean
        default: true

jobs:
  # ============================================================
  # Job 1: amd64 - 8 variants (parallel matrix build)
  # ============================================================
  build-amd64:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_amd64 }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          # variant name        | SIMD? | IO_URING? | TC?
          - name: base
            simd: "OFF"
            iouring: "OFF"
            tc: "OFF"
          - name: simd
            simd: "ON"
            iouring: "OFF"
            tc: "OFF"
          - name: io-uring
            simd: "OFF"
            iouring: "ON"
            tc: "OFF"
          - name: io-uring-simd
            simd: "ON"
            iouring: "ON"
            tc: "OFF"
          - name: tc-simd
            simd: "ON"
            iouring: "OFF"
            tc: "ON"
          - name: tc-io-uring
            simd: "OFF"
            iouring: "ON"
            tc: "ON"
          - name: tc-io-uring-simd
            simd: "ON"
            iouring: "ON"
            tc: "ON"

    runs-on: ubuntu-latest
    env:
      THIRD_PARTY_DIR: ${{ github.workspace }}/3rd/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: picetor/openppp2
          ref: master

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake autoconf automake libtool \
            zip unzip curl wget git python3 \
            libssl-dev libzstd-dev \
            liburing-dev libbpf-dev libelf-dev

      - name: Download prebuilt 3rd-party libraries (amd64)
        run: |
          git clone https://github.com/liulilittle/openppp2-ubuntu-3rd-environment.git 3rd
          echo "3rd-party libraries downloaded to ${{ env.THIRD_PARTY_DIR }}"
          ls -la "${{ env.THIRD_PARTY_DIR }}" || echo "WARNING: amd64 dir not found, trying root"
          ls -la "${{ github.workspace }}/3rd/" || echo "WARNING: 3rd dir empty"

      - name: Build variant ${{ matrix.variant.name }}
        id: build
        run: |
          TS=$(date '+%Y%m%d_%H%M')
          VARIANT="${{ matrix.variant.name }}"
          SIMD="${{ matrix.variant.simd }}"
          IOURING="${{ matrix.variant.iouring }}"
          TC="${{ matrix.variant.tc }}"
          THIRD_PARTY_DIR="${{ env.THIRD_PARTY_DIR }}"

          echo "=== Building: ${VARIANT} ==="
          echo "SIMD=${SIMD}, IO_URING=${IOURING}, TC=${TC}"
          echo "THIRD_PARTY_DIR=${THIRD_PARTY_DIR}"

          # Build CMake flags - use THIRD_PARTY_DIR directly (no /root/dev symlink needed)
          CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=Release -DTHIRD_PARTY_LIBRARY_DIR=${THIRD_PARTY_DIR}"

          # SIMD: NOT_HAVE_SIMD=ON disables SIMD
          if [ "${SIMD}" = "OFF" ]; then
            CMAKE_FLAGS="${CMAKE_FLAGS} -DNOT_HAVE_SIMD=ON"
          fi

          # IO_URING
          if [ "${IOURING}" = "ON" ]; then
            CMAKE_FLAGS="${CMAKE_FLAGS} -DENABLE_IO_URING=ON"
          fi

          # TC
          if [ "${TC}" = "ON" ]; then
            CMAKE_FLAGS="${CMAKE_FLAGS} -DENABLE_TC=ON"
          fi

          # Build
          rm -rf build && mkdir build && cd build
          cmake .. ${CMAKE_FLAGS}
          make -j$(nproc)

          # Check binary
          if [ ! -f "../bin/ppp" ]; then
            echo "ERROR: bin/ppp not found!"
            find .. -name ppp -type f 2>/dev/null
            exit 1
          fi

          # Name output
          SUFFIX=""
          if [ "${VARIANT}" != "base" ]; then
            SUFFIX="-${VARIANT}"
          fi
          ARTIFACT_NAME="openppp2-linux-amd64${SUFFIX}_${TS}"
          cp ../bin/ppp "${ARTIFACT_NAME}"
          file "${ARTIFACT_NAME}"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-linux-amd64-${{ matrix.variant.name }}
          path: build/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

  # ============================================================
  # Job 2: aarch64 - 4 variants (parallel matrix build, cross-compile)
  # ============================================================
  build-aarch64:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_aarch64 }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: base
            iouring: "OFF"
            tc: "OFF"
          - name: io-uring
            iouring: "ON"
            tc: "OFF"
          - name: tc
            iouring: "OFF"
            tc: "ON"
          - name: tc-io-uring
            iouring: "ON"
            tc: "ON"

    runs-on: ubuntu-latest
    env:
      THIRD_PARTY_DIR: ${{ github.workspace }}/3rd/aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: picetor/openppp2
          ref: master

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake autoconf automake libtool \
            zip unzip curl wget git python3 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download prebuilt 3rd-party libraries (aarch64)
        run: |
          git clone https://github.com/liulilittle/openppp2-ubuntu-3rd-environment.git 3rd
          echo "3rd-party libraries downloaded"
          ls -la "${{ env.THIRD_PARTY_DIR }}" || echo "WARNING: aarch64 dir not found"

      - name: Build arm64 cross libs (zstd, zlib, liburing)
        run: |
          set -e
          ARM64_LIB_DIR="${{ env.THIRD_PARTY_DIR }}"

          # Download arm64 deb packages from Ubuntu 22.04 (jammy) which has working arm64 repos
          # to extract libzstd.a and libz.a for cross-compilation
          echo "=== Downloading arm64 libzstd-dev from Ubuntu jammy ==="
          curl -sL -o /tmp/libzstd-dev-arm64.deb \
            "http://ports.ubuntu.com/ubuntu-ports/pool/main/libzstd/libzstd/1.5.5+dfsg2-2build1/libzstd-dev_1.5.5+dfsg2-2build1_arm64.deb" || \
            curl -sL -o /tmp/libzstd-dev-arm64.deb \
            "http://ports.ubuntu.com/ubuntu-ports/pool/main/libzstd/libzstd/1.5.4+dfsg2-5/libzstd-dev_1.5.4+dfsg2-5_arm64.deb" || \
            echo "Trying latest version..."
          if [ -f /tmp/libzstd-dev-arm64.deb ] && [ -s /tmp/libzstd-dev-arm64.deb ]; then
            mkdir -p /tmp/zstd-extract
            dpkg-deb -x /tmp/libzstd-dev-arm64.deb /tmp/zstd-extract
            find /tmp/zstd-extract -name "libzstd*.a" -exec cp -v {} "${ARM64_LIB_DIR}/" \;
          else
            echo "WARNING: Could not download libzstd-dev arm64 deb, will build from source"
            # Build zstd from source for arm64
            git clone --depth 1 -b v1.5.6 https://github.com/facebook/zstd.git /tmp/zstd-src
            cd /tmp/zstd-src
            CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
            make -j$(nproc) lib/libzstd.a CC=aarch64-linux-gnu-gcc AR=aarch64-linux-gnu-ar
            cp lib/libzstd.a "${ARM64_LIB_DIR}/"
            echo "zstd built from source"
          fi

          echo "=== Downloading arm64 zlib1g-dev from Ubuntu jammy ==="
          curl -sL -o /tmp/zlib1g-dev-arm64.deb \
            "http://ports.ubuntu.com/ubuntu-ports/pool/main/z/zlib/zlib1g-dev_1.2.13-4_arm64.deb" || \
            curl -sL -o /tmp/zlib1g-dev-arm64.deb \
            "http://ports.ubuntu.com/ubuntu-ports/pool/main/z/zlib/zlib1g-dev_1.2.11.dfsg-2_arm64.deb"
          if [ -f /tmp/zlib1g-dev-arm64.deb ] && [ -s /tmp/zlib1g-dev-arm64.deb ]; then
            mkdir -p /tmp/zlib-extract
            dpkg-deb -x /tmp/zlib1g-dev-arm64.deb /tmp/zlib-extract
            find /tmp/zlib-extract -name "libz*.a" -exec cp -v {} "${ARM64_LIB_DIR}/" \;
          else
            echo "WARNING: Could not download zlib1g-dev arm64 deb, will build from source"
            git clone --depth 1 -b v1.3.1 https://github.com/madler/zlib.git /tmp/zlib-src
            cd /tmp/zlib-src
            CC=aarch64-linux-gnu-gcc AR=aarch64-linux-gnu-ar \
            ./configure --static --prefix=/tmp/zlib-install
            make -j$(nproc)
            cp libz.a "${ARM64_LIB_DIR}/"
            echo "zlib built from source"
          fi

          # Build liburing for arm64 (needed for io_uring variant)
          echo "=== Building liburing for arm64 ==="
          git clone --depth 1 -b liburing-2.8 https://github.com/axboe/liburing.git /tmp/liburing-src || \
          git clone --depth 1 https://github.com/axboe/liburing.git /tmp/liburing-src
          cd /tmp/liburing-src
          CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
          AR=aarch64-linux-gnu-ar RANLIB=aarch64-linux-gnu-ranlib \
          ./configure --prefix=/tmp/liburing-install --libdir=/tmp/liburing-install/lib
          make -j$(nproc)
          make install
          find /tmp/liburing-install -name "*.a" -exec cp -v {} "${ARM64_LIB_DIR}/" \;
          # Also copy include dir
          mkdir -p "${ARM64_LIB_DIR}/liburing/src/include"
          cp -r /tmp/liburing-install/include/* "${ARM64_LIB_DIR}/liburing/src/include/" 2>/dev/null || true
          if [ -d /tmp/liburing-src/src/include ]; then
            mkdir -p "${ARM64_LIB_DIR}/liburing/src"
            cp -r /tmp/liburing-src/src/include "${ARM64_LIB_DIR}/liburing/src/"
          fi
          echo "liburing built for arm64"

          echo "=== Final arm64 libs ==="
          ls -la "${ARM64_LIB_DIR}/"/*.a 2>/dev/null || echo "No .a files found"

      - name: Create aarch64 toolchain file
        run: |
          cat > /tmp/aarch64-toolchain.cmake << 'TOOLCHAIN_EOF'
          SET(CMAKE_SYSTEM_NAME Linux)
          SET(CMAKE_SYSTEM_PROCESSOR aarch64)

          SET(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          SET(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)

          SET(CMAKE_LINKER aarch64-linux-gnu-ld)
          SET(CMAKE_AR aarch64-linux-gnu-ar)
          SET(CMAKE_NM aarch64-linux-gnu-nm)
          SET(CMAKE_OBJCOPY aarch64-linux-gnu-objcopy)
          SET(CMAKE_OBJDUMP aarch64-linux-gnu-objdump)
          SET(CMAKE_STRIP aarch64-linux-gnu-strip)
          SET(CMAKE_RANLIB aarch64-linux-gnu-ranlib)

          # Static link flags for aarch64
          # NOTE: -nodefaultlibs breaks CMake compiler detection for cross-compilers,
          # so we omit it here. The actual build uses -static which is sufficient.
          SET(CMAKE_EXE_LINKER_FLAGS_INIT "-static -no-pie -Wl,--gc-sections -s -rdynamic -Wl,-Bstatic")

          SET(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu /usr/lib/aarch64-linux-gnu)
          SET(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          SET(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          SET(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)

          # Explicitly set library directories for cross-compilation
          LINK_DIRECTORIES(/usr/lib/aarch64-linux-gnu /usr/aarch64-linux-gnu/lib)
          TOOLCHAIN_EOF
          echo "Toolchain file created at /tmp/aarch64-toolchain.cmake"

      - name: Build variant ${{ matrix.variant.name }}
        id: build
        run: |
          TS=$(date '+%Y%m%d_%H%M')
          VARIANT="${{ matrix.variant.name }}"
          IOURING="${{ matrix.variant.iouring }}"
          TC="${{ matrix.variant.tc }}"

          echo "=== Building aarch64: ${VARIANT} ==="
          echo "IO_URING=${IOURING}, TC=${TC}"
          echo "THIRD_PARTY_DIR=${{ env.THIRD_PARTY_DIR }}"

          # aarch64 always disables SIMD (AES-NI is x86 only)
          CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=Release"
          CMAKE_FLAGS="${CMAKE_FLAGS} -DNOT_HAVE_SIMD=ON"
          CMAKE_FLAGS="${CMAKE_FLAGS} -DCMAKE_TOOLCHAIN_FILE=/tmp/aarch64-toolchain.cmake"
          CMAKE_FLAGS="${CMAKE_FLAGS} -DTHIRD_PARTY_LIBRARY_DIR=${{ env.THIRD_PARTY_DIR }}"

          # IO_URING
          if [ "${IOURING}" = "ON" ]; then
            CMAKE_FLAGS="${CMAKE_FLAGS} -DENABLE_IO_URING=ON"
          fi

          # TC
          if [ "${TC}" = "ON" ]; then
            CMAKE_FLAGS="${CMAKE_FLAGS} -DENABLE_TC=ON"
          fi

          # Build
          rm -rf build && mkdir build && cd build
          cmake .. ${CMAKE_FLAGS}
          make -j$(nproc)

          # Check binary
          if [ ! -f "../bin/ppp" ]; then
            echo "ERROR: bin/ppp not found!"
            find .. -name ppp -type f 2>/dev/null
            exit 1
          fi

          # Name output
          SUFFIX=""
          if [ "${VARIANT}" != "base" ]; then
            SUFFIX="-${VARIANT}"
          fi
          ARTIFACT_NAME="openppp2-linux-aarch64${SUFFIX}_${TS}"
          cp ../bin/ppp "${ARTIFACT_NAME}"
          file "${ARTIFACT_NAME}"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-linux-aarch64-${{ matrix.variant.name }}
          path: build/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

  # ============================================================
  # Job 3: macOS - arm64 + amd64
  # ============================================================
  build-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_macos }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: arm64
            arch: arm64
            triple: darwin-arm64
            repo: Liz-Nozomi/openppp2-macos-arm64-environment
          - name: amd64
            arch: x86_64
            triple: darwin-amd64
            repo: liulilittle/openppp2-macos-amd64-environment

    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: picetor/openppp2
          ref: master

      - name: Download prebuilt 3rd-party libraries (macOS ${{ matrix.platform.name }})
        run: |
          git clone https://github.com/${{ matrix.platform.repo }}.git 3rd
          echo "3rd-party libraries downloaded"
          ls -la 3rd/ || echo "WARNING: 3rd dir empty"

      - name: Build openppp2 (macOS ${{ matrix.platform.name }})
        id: build
        run: |
          NCPU=$(sysctl -n hw.physicalcpu)
          TS=$(date '+%Y%m%d_%H%M')
          ARCH="${{ matrix.platform.arch }}"
          TRIPLE="${{ matrix.platform.triple }}"

          echo "=== Building macOS ${TRIPLE} ==="
          echo "ncpu=${NCPU}"

          # ARM64 doesn't support x86 AES/SSE SIMD instructions
          SIMD_FLAG=""
          if [ "${ARCH}" = "arm64" ]; then
            SIMD_FLAG="-DNOT_HAVE_SIMD=ON"
            echo "ARM64 detected: disabling SIMD (-maes -msse2 -mpclmul not supported)"
          fi

          # Build
          rm -rf build && mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${ARCH} \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DTHIRD_PARTY_LIBRARY_DIR=${GITHUB_WORKSPACE}/3rd \
            ${SIMD_FLAG}
          make -j ${NCPU}

          # Check binary
          if [ ! -f "../bin/ppp" ]; then
            echo "ERROR: bin/ppp not found!"
            find .. -name ppp -type f 2>/dev/null
            exit 1
          fi

          # Name output
          ARTIFACT_NAME="openppp2-${TRIPLE}_${TS}"
          cp ../bin/ppp "${ARTIFACT_NAME}"
          file "${ARTIFACT_NAME}"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-macos-${{ matrix.platform.name }}
          path: build/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error

  # ============================================================
  # Job 4: Windows - x64 (MSBuild + vcpkg)
  # ============================================================
  build-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_windows }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: picetor/openppp2
          ref: master

      - name: Install vcpkg dependencies
        run: |
          cd "${{ github.workspace }}\vcpkg"
          .\bootstrap-vcpkg.bat
          .\vcpkg install boost-system boost-coroutine boost-thread boost-context boost-regex boost-filesystem openssl jemalloc --triplet x64-windows-static
        shell: cmd

      - name: Build openppp2 (Windows x64)
        id: build
        run: |
          $TS = Get-Date -Format "yyyyMMdd_HHmm"
          echo "=== Building Windows x64 Release ==="

          # Restore NuGet packages and build
          msbuild ppp.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild /m

          # Check binary
          if (-not (Test-Path "x64\Release\ppp.exe")) {
            Write-Error "ERROR: ppp.exe not found!"
            Get-ChildItem -Recurse -Filter "ppp.exe" | Select-Object FullName
            exit 1
          }

          # Name output
          $ARTIFACT_NAME = "openppp2-windows-amd64_${TS}"
          Copy-Item "x64\Release\ppp.exe" "${ARTIFACT_NAME}"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "status=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-amd64
          path: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
