# Description: Build openppp2 Windows (MSVC) - Release workflow
# Author     : picetor
# Date-Time  : 2026/06/24

name: Build openppp2 (Windows)

on:
  push:
    branches: [ master ]
    paths:
      - 'windows/**'
      - 'sln/**'
      - 'vcpkg/**'
      - 'Driver/**'
      - 'common/**'
      - 'ppp/**'
      - 'CMakeLists.txt'
      - 'ppp.sln'
      - 'ppp.vcxproj'
      - 'ppp.vcxproj.filters'
      - '.github/workflows/build-openppp2-windows.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'windows/**'
      - 'sln/**'
      - 'vcpkg/**'
      - 'Driver/**'
      - 'common/**'
      - 'ppp/**'
      - 'CMakeLists.txt'
      - 'ppp.sln'
      - 'ppp.vcxproj'
      - 'ppp.vcxproj.filters'
      - '.github/workflows/build-openppp2-windows.yml'
  workflow_dispatch:      # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          repository: picetor/openppp2
          ref: master

      - name: Restore vcpkg from cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg/packages
            ${{ github.workspace }}/vcpkg/downloads
          # Cache key: invalidate when vcxproj deps change or vcpkg ports change
          key: vcpkg-${{ hashFiles('ppp.vcxproj') }}
          restore-keys: |
            vcpkg-

      - name: Setup vcpkg
        run: |
          if (-not (Test-Path "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat")) {
            cd ${{ github.workspace }}
            git clone https://github.com/microsoft/vcpkg.git
            cd vcpkg
            .\bootstrap-vcpkg.bat
          } else {
            Write-Output "vcpkg already exists, skipping clone"
          }
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $env:GITHUB_ENV
          echo "${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies via vcpkg
        run: |
          cd ${{ github.workspace }}/vcpkg
          .\vcpkg install `
            boost-asio boost-beast boost-json boost-program-options boost-system boost-thread `
            boost-lockfree boost-uuid boost-coroutine boost-filesystem boost-stacktrace `
            openssl jemalloc `
            --triplet x64-windows-static `
            --x-install-root=${{ github.workspace }}\..\vcpkg_installed

      - name: Download cacert.pem
        run: |
          curl -sL -o ${{ github.workspace }}/cacert.pem https://curl.se/ca/cacert.pem
          if (Test-Path "${{ github.workspace }}/cacert.pem") {
            Write-Output "cacert.pem downloaded successfully"
          } else {
            Write-Error "Failed to download cacert.pem"
            exit 1
          }

      - name: Setup MSBuild path
        run: |
          # Try vswhere first (most reliable on GitHub Actions)
          $msbuildPath = $null
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $msbuildPath = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
            if ($msbuildPath) {
              Write-Output "Found MSBuild via vswhere: $msbuildPath"
            }
          }
          # Fallback: check standard locations
          if (-not $msbuildPath) {
            $searchDirs = @(
              "${env:ProgramFiles}\Microsoft Visual Studio",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio"
            )
            foreach ($dir in $searchDirs) {
              if (Test-Path $dir) {
                $found = Get-ChildItem -Path $dir -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match 'Bin\\MSBuild\.exe$' } |
                  Select-Object -First 1 -ExpandProperty FullName
                if ($found) {
                  $msbuildPath = $found
                  Write-Output "Found MSBuild via file search: $msbuildPath"
                  break
                }
              }
            }
          }
          if (-not $msbuildPath) {
            Write-Error "MSBuild not found!"
            exit 1
          }
          # Add to PATH for subsequent steps
          $parent = Split-Path $msbuildPath -Parent
          echo "$parent" | Out-File -FilePath $env:GITHUB_PATH -Append
          # Verify using full path (Get-Command won't work in same step after GITHUB_PATH)
          Write-Output "MSBuild: $msbuildPath"
          & $msbuildPath /version

      - name: Copy headers and libs to vcpkg_installed
        run: |
          Write-Output "=== Copying boost headers to vcpkg_installed ==="
          $vcpkgInstalled = "${{ github.workspace }}\..\vcpkg_installed\x64-windows-static"
          $vcpkgPackages = "${{ github.workspace }}\vcpkg\packages"
          if (-not (Test-Path "$vcpkgInstalled\include")) {
            New-Item -ItemType Directory -Path "$vcpkgInstalled\include" -Force | Out-Null
          }
          Get-ChildItem -Path $vcpkgPackages -Directory | ForEach-Object {
            $pkgInclude = Join-Path $_.FullName "include"
            if (Test-Path $pkgInclude) {
              Write-Output "  Copying headers from $($_.Name)..."
              Copy-Item -Path "$pkgInclude\*" -Destination "$vcpkgInstalled\include\" -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          if (-not (Test-Path "$vcpkgInstalled\lib")) {
            New-Item -ItemType Directory -Path "$vcpkgInstalled\lib" -Force | Out-Null
          }
          Get-ChildItem -Path $vcpkgPackages -Directory | ForEach-Object {
            $pkgLib = Join-Path $_.FullName "lib"
            if (Test-Path $pkgLib) {
              Write-Output "  Copying libs from $($_.Name)..."
              Copy-Item -Path "$pkgLib\*" -Destination "$vcpkgInstalled\lib\" -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          Write-Output "=== Header/lib copy complete ==="

          # Create placeholder files for missing items
          if (-not (Test-Path "${{ github.workspace }}\starrylink.net.key")) {
            "# placeholder" | Out-File -FilePath "${{ github.workspace }}\starrylink.net.key"
          }
          if (-not (Test-Path "${{ github.workspace }}\starrylink.net.pem")) {
            "# placeholder" | Out-File -FilePath "${{ github.workspace }}\starrylink.net.pem"
          }

      - name: Build Release x64
        id: build-release
        run: |
          Write-Output "=== Building Release x64 ==="
          msbuild ppp.vcxproj /p:Configuration=Release /p:Platform=x64 `
            "/t:Clean;Build" `
            /p:VcpkgEnableManifest=false `
            /m
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Release build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Build Debug x64 (with PDB symbols)
        id: build-debug
        run: |
          Write-Output "=== Building Debug x64 (with PDB) ==="
          msbuild ppp.vcxproj /p:Configuration=Debug /p:Platform=x64 `
            "/t:Build" `
            /p:VcpkgEnableManifest=false `
            /m
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Debug build failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Package artifacts
        id: package
        run: |
          $TS = Get-Date -Format "yyyyMMdd_HHmm"

          # Find Release executable
          $releaseExe = "x64\Release\ppp.exe"
          if (-not (Test-Path $releaseExe)) {
            $releaseExe = "Release\ppp.exe"
          }
          if (-not (Test-Path $releaseExe)) {
            Write-Error "Release ppp.exe not found!"
            Get-ChildItem -Recurse -Filter "ppp.exe" | Select-Object FullName
            exit 1
          }
          Write-Output "Found Release ppp.exe at: $releaseExe"

          # Find Debug executable and PDB
          $debugExe = "x64\Debug\ppp.exe"
          if (-not (Test-Path $debugExe)) {
            $debugExe = "Debug\ppp.exe"
          }
          $debugPdb = $debugExe -replace '\.exe$', '.pdb'
          if (Test-Path $debugExe) {
            Write-Output "Found Debug ppp.exe at: $debugExe"
          } else {
            Write-Output "Warning: Debug ppp.exe not found, skipping debug symbols"
            $debugExe = $null
          }

          # --- Create release package ---
          $ReleaseDir = "openppp2-windows-x64_${TS}"
          New-Item -ItemType Directory -Path $ReleaseDir -Force | Out-Null

          # Copy Release executable
          Copy-Item $releaseExe "$ReleaseDir\ppp.exe"

          # Copy Debug executable and PDB if available
          if ($debugExe) {
            Copy-Item $debugExe "$ReleaseDir\ppp.debug.exe"
            if (Test-Path $debugPdb) {
              Copy-Item $debugPdb "$ReleaseDir\ppp.pdb"
              Write-Output "Copied PDB symbols: $debugPdb"
            }
          }

          # Copy configuration files
          Copy-Item appsettings.json "$ReleaseDir\appsettings.json"
          Copy-Item cacert.pem "$ReleaseDir\cacert.pem"
          Copy-Item firewall-rules.txt "$ReleaseDir\firewall-rules.txt"
          Copy-Item dns-rules.txt "$ReleaseDir\dns-rules.txt"
          Copy-Item ip.txt "$ReleaseDir\ip.txt"
          Copy-Item cmcc.txt "$ReleaseDir\cmcc.txt"

          # Copy Driver directory if it exists
          if (Test-Path "Driver") {
            Copy-Item -Path "Driver" -Destination "$ReleaseDir\Driver\" -Recurse -Force
          }

          # Copy placeholder certs
          Copy-Item starrylink.net.key "$ReleaseDir\starrylink.net.key"
          Copy-Item starrylink.net.pem "$ReleaseDir\starrylink.net.pem"

          # Create a startup test script
          $lines = @(
            '@echo off',
            'echo Testing ppp.exe --help output...',
            'ppp.exe --help',
            'echo.',
            'echo Exit code: %ERRORLEVEL%',
            'pause'
          )
          $lines | Out-File -FilePath "$ReleaseDir\test_help.bat" -Encoding ASCII

          Write-Output "=== Release package contents ==="
          Get-ChildItem -Path $ReleaseDir -Recurse | Select-Object Mode, Length, Name | Format-Table -AutoSize

          # Create the artifact (zip the whole directory)
          Compress-Archive -Path "$ReleaseDir\*" -DestinationPath "${ReleaseDir}.zip" -Force
          $ArtifactName = "${ReleaseDir}.zip"

          Write-Output "Created artifact: $ArtifactName"

          echo "ARTIFACT_NAME=$ArtifactName" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "status=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: openppp2-windows-x64
          path: ${{ github.workspace }}/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
