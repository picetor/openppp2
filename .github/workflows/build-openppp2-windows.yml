# Description: Build openppp2 Windows (MSVC) - Debug workflow
# Author     : picetor
# Date-Time  : 2026/06/24

name: Build openppp2 (Windows debug)

on:
  workflow_dispatch:      # 仅手动触发

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: base
            iouring: "OFF"
            tc: "OFF"
          - name: io-uring
            iouring: "ON"
            tc: "OFF"
          - name: tc
            iouring: "OFF"
            tc: "ON"
          - name: tc-io-uring
            iouring: "ON"
            tc: "ON"

    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: picetor/openppp2
          ref: master

      - name: Setup vcpkg
        run: |
          cd ${{ github.workspace }}
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $env:GITHUB_ENV
          echo "${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install dependencies via vcpkg
        run: |
          cd ${{ github.workspace }}/vcpkg
          .\vcpkg install `
            boost-asio boost-beast boost-json boost-program-options boost-system boost-thread `
            openssl jemalloc `
            --triplet x64-windows-static

      - name: Download cacert.pem
        run: |
          curl -sL -o ${{ github.workspace }}/cacert.pem https://curl.se/ca/cacert.pem
          if (Test-Path "${{ github.workspace }}/cacert.pem") {
            Write-Output "cacert.pem downloaded successfully"
          } else {
            Write-Error "Failed to download cacert.pem"
            exit 1
          }

      - name: Setup MSBuild path
        run: |
          # Try vswhere first (most reliable on GitHub Actions)
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            $msbuildPath = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
            if ($msbuildPath) {
              Write-Output "Found MSBuild via vswhere: $msbuildPath"
              $parent = Split-Path $msbuildPath -Parent
              echo "$parent" | Out-File -FilePath $env:GITHUB_PATH -Append
            }
          }
          # Also check standard locations
          $msbuildExe = Get-Command "msbuild.exe" -ErrorAction SilentlyContinue
          if (-not $msbuildExe) {
            $paths = @(
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2019\Professional\MSBuild\Current\Bin\MSBuild.exe",
              "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe"
            )
            foreach ($p in $paths) {
              if (Test-Path $p) {
                Write-Output "Found MSBuild: $p"
                $parent = Split-Path $p -Parent
                echo "$parent" | Out-File -FilePath $env:GITHUB_PATH -Append
                break
              }
            }
          }
          # Verify
          $msbuildExe = Get-Command "msbuild.exe" -ErrorAction SilentlyContinue
          if ($msbuildExe) {
            Write-Output "MSBuild found: $($msbuildExe.Source)"
            & $msbuildExe.Source /version
          } else {
            Write-Error "MSBuild not found!"
            exit 1
          }

      - name: Build variant ${{ matrix.variant.name }}
        id: build
        run: |
          $TS = Get-Date -Format "yyyyMMdd_HHmm"
          $Variant = "${{ matrix.variant.name }}"
          $Iouring = "${{ matrix.variant.iouring }}"
          $Tc = "${{ matrix.variant.tc }}"

          Write-Output "=== Building Windows: ${Variant} ==="
          Write-Output "IO_URING=${Iouring}, TC=${Tc}"

          # Set defines based on variant
          $Defines = ""
          if ($Iouring -eq "ON") {
            $Defines = "$Defines /DENABLE_IO_URING"
          }
          if ($Tc -eq "ON") {
            $Defines = "$Defines /DENABLE_TC"
          }

          # Build with MSBuild
          msbuild ppp.sln /p:Configuration=Release /p:Platform=x64 `
            /p:AdditionalOptions="$Defines" `
            /t:Clean;Build `
            /m

          if ($LASTEXITCODE -ne 0) {
            Write-Error "MSBuild failed with exit code $LASTEXITCODE"
            exit 1
          }

          # Find the built executable
          $exePath = "x64\Release\ppp.exe"
          if (-not (Test-Path $exePath)) {
            $exePath = "Release\ppp.exe"
          }
          if (-not (Test-Path $exePath)) {
            Write-Error "ppp.exe not found!"
            Get-ChildItem -Recurse -Filter "ppp.exe" | Select-Object FullName
            exit 1
          }

          Write-Output "Found ppp.exe at: $exePath"

          $Suffix = ""
          if ($Variant -ne "base") {
            $Suffix = "-${Variant}"
          }
          $ArtifactName = "openppp2-windows-x64${Suffix}_${TS}.exe"
          Copy-Item $exePath $ArtifactName

          echo "ARTIFACT_NAME=$ArtifactName" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "status=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openppp2-windows-x64-${{ matrix.variant.name }}
          path: ${{ github.workspace }}/${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
