# Description: Create a GitHub Release from build artifacts.
# Author     : picetor
# Date-Time  : 2026/06/24

name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v6.24)'
        required: true
        type: string
      build_amd64:
        description: 'Include Linux amd64 builds'
        type: boolean
        default: true
      build_aarch64:
        description: 'Include Linux aarch64 builds'
        type: boolean
        default: true
      build_windows:
        description: 'Include Windows x64 builds'
        type: boolean
        default: false
      build_macos:
        description: 'Include macOS builds'
        type: boolean
        default: true

jobs:
  # First, trigger all build workflows and wait for them
  # Since we can't directly depend on workflow_run across repos easily,
  # we use separate download jobs per platform

  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          repository: picetor/openppp2
          ref: inet6

      - name: Download Linux amd64 artifacts
        if: ${{ inputs.build_amd64 }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-openppp2-amd64.yml
          branch: inet6
          name: openppp2-linux-amd64-*
          name_prefix: openppp2-linux-amd64-
          path: dist/linux-amd64
          skip_unpack: false

      - name: Download Linux aarch64 artifacts
        if: ${{ inputs.build_aarch64 }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-openppp2-aarch64.yml
          branch: inet6
          name: openppp2-linux-aarch64-*
          name_prefix: openppp2-linux-aarch64-
          path: dist/linux-aarch64
          skip_unpack: false

      - name: Download Windows artifacts
        if: ${{ inputs.build_windows }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-openppp2-windows.yml
          branch: inet6
          name: openppp2-windows-x64
          path: dist/windows
          skip_unpack: false

      - name: Download macOS artifacts
        if: ${{ inputs.build_macos }}
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-openppp2-macos.yml
          branch: inet6
          name: openppp2-macos-*
          name_prefix: openppp2-macos-
          path: dist/macos
          skip_unpack: false

      - name: Organize release assets
        run: |
          echo "=== Release assets ==="
          mkdir -p release-assets
          find dist -name "*.zip" -exec cp -v {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "openppp2 ${{ inputs.tag }}"
          body: |
            # 🚀 openppp2 ${{ inputs.tag }}

            > 基于上游 [liulilittle/openppp2](https://github.com/liulilittle/openppp2) 修改版编译。

            ---

            ## 编译环境

            | 平台 | 环境 |
            |------|------|
            | Linux amd64 | Ubuntu 24.04, GCC 13, CMake 3.28.3, Make |
            | Linux aarch64 | 交叉编译 (aarch64-linux-gnu-g++-13), Ubuntu 24.04 |
            | macOS | macOS 14 (arm64), Apple Clang, CMake, Make |
            | Windows | windows-latest, MSVC (Visual Studio 2022), vcpkg |

            ## 包含的二进制文件

            | 文件名 | 架构 | 特性 |
            |--------|------|------|
            ${{ inputs.build_amd64 && '| `openppp2-linux-amd64` | x86_64 | 基础版 |
            | `openppp2-linux-amd64-simd` | x86_64 | SIMD 优化 |
            | `openppp2-linux-amd64-io-uring` | x86_64 | io_uring |
            | `openppp2-linux-amd64-io-uring-simd` | x86_64 | io_uring + SIMD |
            | `openppp2-linux-amd64-tc-simd` | x86_64 | 时间校正 + SIMD |
            | `openppp2-linux-amd64-tc-io-uring` | x86_64 | 时间校正 + io_uring |
            | `openppp2-linux-amd64-tc-io-uring-simd` | x86_64 | 时间校正 + io_uring + SIMD |' || '' }}
            ${{ inputs.build_aarch64 && '| `openppp2-linux-arm64` | ARM64 | 基础版 |
            | `openppp2-linux-arm64-io-uring` | ARM64 | io_uring |
            | `openppp2-linux-arm64-tc` | ARM64 | 时间校正 |
            | `openppp2-linux-arm64-tc-io-uring` | ARM64 | 时间校正 + io_uring |' || '' }}
            ${{ inputs.build_macos && '| `openppp2-darwin-amd64` | macOS x86_64 | 基础版 |
            | `openppp2-darwin-arm64` | macOS ARM64 | 基础版 |' || '' }}
            ${{ inputs.build_windows && '| `openppp2-windows-x64` | Windows x64 | 基础版 |' || '' }}

            > 每个 zip 包含：`ppp` 二进制 + `appsettings.json` + `dns-rules.txt` + `firewall-rules.txt` + `ip.txt`

            ---

            ## 🚀 快速开始

            ### 服务器
            ```json
            {"tcp":{"listen":{"port":20000}},"websocket":{"host":"your-domain.com","path":"/tun","listen":{"ws":20080,"wss":20443}}}
            ```

            ### 客户端 — PPP 直连
            ```json
            {"client":{"server":"ppp://your-server.com:20000/"}}
            ```

            ### 客户端 — 优选 IP + WSS
            ```json
            {"client":{"server":"wss://IP:20443/tun","websocket":{"host":"your-domain.com","sni":"your-domain.com"}}}
            ```

            ---

            ## ⚠️ 注意事项
            1. WSS 需要自行准备 SSL 证书
            2. Windows 需安装 TAP 驱动（`Driver/` 目录，已签名）
            3. `ppp.exe` 需要管理员权限运行
            4. Debug 版本仅用于诊断，勿用于生产环境

            <p align="center"><a href="https://github.com/picetor/openppp2">github.com/picetor/openppp2</a></p>
          files: release-assets/*
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
